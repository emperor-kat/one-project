name: Docs spellcheck

on:
  pull_request:
    paths:
      - docs/**

jobs:
  spellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g cspell

      - run: cspell docs