name: Vale Linting
on: [pull_request]

jobs:
  vale:
    name: Runner - Vale
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Vale
        uses: errata-ai/vale-action@v2.0.0

      - name: Run Vale
        run: |
          vale --config=.vale.ini --output=line --no-exit docs/