site_url: https://emperor-kat.github.io/one-project/
site_name: Barnaul Refrigerator Guide
site_description: Your complete guide to choosing the best refrigerator in Barnaul
site_author: Appliance Expert

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    primary: blue
    accent: deep orange

plugins:
  - search
  - i18n:
      default_language: en 
      languages:
        - locale: en
          name: English
        - locale: ru
          name: Русский

extra:
  generator: false
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: Русский
      link: /ru/
      lang: ru

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - tables

nav:
  - Home: index.md
  - Buying Guide:
      - Overview: guide/overview.md
      - Type: guide/types.md
      - Brand: guide/brands.md
  - Barnaul Stores:
      - Store Reviews: stores/index.md
      - Price Comparison: stores/prices.md